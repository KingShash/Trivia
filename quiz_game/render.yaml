services:
  - type: web
    name: quiz-game
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DB_PATH
        value: /data/quiz.db
    disk:
      name: quiz-data
      mountPath: /data
      sizeGB: 1
